<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="A hidden Barkey Pet Sitting Easter egg for curious visitors.">
  <title>Secret Animal Lounge - Barkey Pet Sitting</title>
  <link rel="icon" href="assets/favicon/favicon-dog.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-dog-sm.png">
  <link rel="apple-touch-icon" href="assets/favicon/favicon-dog-med.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&family=Josefin+Sans:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css?v=3">
  <link rel="stylesheet" href="assets/css/shape-components.css">
  <script src="assets/js/script.js" defer></script>
  <script src="assets/js/secret-lounge.js" defer></script>
</head>

<body class="secret-lounge-page">
  <main class="secret-lounge" aria-labelledby="secret-lounge-title">
    <section class="secret-lounge__panel">
      <p class="page-kicker kicker-with-icon kicker-with-icon-gold">Hidden room</p>
      <h1 id="secret-lounge-title">🐾 Secret Animal Lounge</h1>
      <p>
        Welcome to Cosmo's Lounge. <br> <span>Your presence is noted.</span>
      </p>
      <div class="secret-lounge__mascot">
        <div class="secret-lounge__bubble" id="secret-cat-bubble" aria-live="polite">Meow</div>
        <button class="secret-lounge__cat-button" type="button" aria-describedby="secret-cat-help"
          aria-label="Ask the lounge cat to say meow">
          <img src="assets/images/cat-black-sitting.webp" width="601" height="1123"
            alt="Black cat mascot sitting in the Secret Animal Lounge">
        </button>
        <p id="secret-cat-help" class="secret-lounge__hint">Click Cosmo.</p>
      </div>
    </section>
  </main>
</body>

</html>
