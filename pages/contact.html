<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Susan at Barkey Pet Sitting with a public pet care inquiry." />
  <title>Contact Susan - Barkey Pet Sitting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&family=Josefin+Sans:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=3">
  <link rel="stylesheet" href="../assets/css/shape-components.css">
  <script src="../assets/js/script.js" defer></script>
</head>

<body class="layout-shell">
  <header class="site-header layout-rail">
    <a class="logo" href="../index.html" aria-label="Barkey Pet Sitting home">
      <div class="logo-text">
        <span class="brand-name">Barkey</span>
        <span class="brand-sub">PET SITTING</span>
      </div>
    </a>

    <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html" class="active">Contact</a>
      <img class="mobile-menu-cat" src="../assets/images/cat-black-laying.svg" alt="">
    </nav>

    <figure class="nav-illustration">
      <img src="../assets/images/cat-black-sitting.webp" alt="Decorative black cat illustration">
    </figure>
  </header>

  <main class="layout-main">
    <section class="page-hero" aria-labelledby="contact-title">
      <h1 id="contact-title" class="page-title">Contact Susan</h1>
      <p class="page-intro contact-page-intro">
        Use this public inquiry form to start a conversation about care for your pet.
      </p>
    </section>

    <section class="contact-editorial" aria-label="Public inquiry form">
      <div class="contact-form-card">
        <form class="retro-contact-form" action="https://formspree.io/f/xgobyjdw" method="POST">
          <div class="form-group">
            <label for="name">Your Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number (Optional)</label>
            <input type="tel" id="phone" name="phone" placeholder="(619) 555-5555">
          </div>

          <div class="form-row-grid">
            <div class="form-group">
              <label for="pet_names">Pet Name(s)</label>
              <input type="text" id="pet_names" name="pet_names" placeholder="Milo, Luna, Kiwi">
            </div>

            <div class="form-group">
              <label for="species">Species</label>
              <input type="text" id="species" name="species" placeholder="Dog, cat, bird, reptile">
            </div>
          </div>

          <div class="form-group">
            <label for="preferred_contact">Preferred Contact Method</label>
            <div class="select-wrapper">
              <select id="preferred_contact" name="preferred_contact">
                <option value="Email">Email</option>
                <option value="Phone Call">Phone Call</option>
                <option value="Text Message">Text Message</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="message">Your Message <span class="required">*</span></label>
            <textarea id="message" name="message" rows="5"
              placeholder="Tell Susan about your pet, the dates needed, and the type of care you're looking for."
              required></textarea>
          </div>

          <button type="submit" class="contact-badge submit-btn" aria-label="Contact Susan">
            <img src="../assets/images/shapes/boom-orange.svg" class="contact-badge__boom contact-badge__shape-base"
              alt="">
            <img src="../assets/images/shapes/boom-yellow.svg" class="contact-badge__boom contact-badge__shape-hover"
              alt="">
            <img src="../assets/images/shapes/banner-yellow.svg" class="contact-badge__banner contact-badge__shape-base"
              alt="">
            <img src="../assets/images/shapes/banner-orange.svg"
              class="contact-badge__banner contact-badge__banner--orange contact-badge__shape-hover" alt="">
            <img src="../assets/images/shapes/twinkle-star-pale-gold.svg" class="contact-badge__star" alt="">
            <span class="contact-badge__text">Contact Susan</span>
          </button>
          <p class="form-note">Susan will follow up by email or your preferred contact method.</p>
        </form>
      </div>
    </section>

    <section class="framework-footer">
      <div class="copyright-bar">
        <p>&copy; <span id="year"></span> Barkey Pet Sitting.</p>
      </div>
    </section>
  </main>
</body>

</html>
